<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Life OS</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Auth View -->
        <div id="auth-view" class="view active">
            <div class="glass-card auth-card">
                <h1>AI Life OS</h1>
                <p class="subtitle">Level up your coding journey.</p>
                <div class="tabs">
                    <button class="tab active" onclick="switchAuth('login')">Login</button>
                    <button class="tab" onclick="switchAuth('signup')">Sign Up</button>
                </div>
                <!-- Login Form -->
                <form id="login-form">
                    <input type="text" id="login-username" placeholder="Username" required>
                    <input type="password" id="login-password" placeholder="Password" required>
                    <button type="submit" class="btn primary-btn">Enter System</button>
                </form>
                <!-- Signup Form -->
                <form id="signup-form" style="display: none;">
                    <input type="text" id="signup-username" placeholder="Username" required>
                    <input type="email" id="signup-email" placeholder="Email" required>
                    <input type="password" id="signup-password" placeholder="Password" required>
                    <button type="submit" class="btn primary-btn">Create Hunter Profile</button>
                </form>
                <div id="auth-error" class="error-msg"></div>
            </div>
        </div>

        <!-- Dashboard View -->
        <div id="dashboard-view" class="view">
            <nav class="navbar">
                <div class="logo">AI Life OS</div>
                <button onclick="logout()" class="btn secondary-btn">Log Output</button>
            </nav>
            
            <div class="dashboard-container">
                <!-- User Stats Profile -->
                <div class="glass-card profile-card glow">
                    <h2>Hunter Profile</h2>
                    <h3 id="profile-name">@username</h3>
                    <div class="stats-grid">
                        <div class="stat-box">
                            <span class="label">LEVEL</span>
                            <span class="value" id="profile-level">1</span>
                        </div>
                        <div class="stat-box">
                            <span class="label">XP</span>
                            <span class="value" id="profile-xp">0</span>
                        </div>
                        <div class="stat-box">
                            <span class="label">STREAK</span>
                            <span class="value" id="profile-streak">0 🔥</span>
                        </div>
                    </div>
                </div>

                <!-- Main Activity Area -->
                <div class="main-activity">
                    <div class="glass-card">
                        <h2>Training Ground</h2>
                        <p class="subtitle">Submit a solution for evaluation. Complete tasks to earn XP and level up!</p>
                        
                        <div class="form-group">
                            <textarea id="code-snippet" placeholder="Write your Java/Python code here to solve the problem..."></textarea>
                        </div>
                        <button onclick="submitSolution()" class="btn primary-btn action-btn">Submit to AI Evaluator</button>
                        
                        <div id="eval-result" class="eval-result" style="display: none;">
                            <!-- Evaluation outcome -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
